name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Expo Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/client

      - name: Build frontend for GitHub Pages
        run: npm run build:web
        working-directory: apps/client
        env:
          EXPO_GITHUB_PAGES_BASE_URL: /${{ github.event.repository.name }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_AMAP_JS_KEY: ${{ vars.EXPO_PUBLIC_AMAP_JS_KEY }}
          EXPO_PUBLIC_AMAP_SERVICE_HOST: ${{ vars.EXPO_PUBLIC_AMAP_SERVICE_HOST }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/client/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy frontend
        id: deployment
        uses: actions/deploy-pages@v4
